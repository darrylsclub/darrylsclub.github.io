<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Darryl's Club!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            max-width: 700px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #000000;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .bw-image {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            border-radius: 10px;
            filter: grayscale(100%);
        }

        .link-btn {
            display: block;
            margin: 15px auto;
            padding: 12px 20px;
            width: 200px;
            font-size: 18px;
            color: #ffffff;
            background-color: #000000;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.2s;
        }

        .link-btn:hover {
            background-color: #333333;
        }
    </style>
</head>
<body>
    <h1>Welcome to Darryl's Club!</h1>

    <img class="bw-image" src="https://picsum.photos/600/300?grayscale" alt="Black and white image">

    <p>
        Hello, welcome to Darryl's Club official website! If you came here to join our Discord server, use the first redirection down below.<br><br>
        If you came here to join our Null's brawl club, please use the second redirection below.<br><br>
        Thank you for supporting us!
    </p>

    <a href="link1" class="link-btn">Link 1</a>
    <a href="link2" class="link-btn">Link 2</a>

</body>
</html>
